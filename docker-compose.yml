services:

  guardian-api:
    build: .
    container_name: guardian-api

    command:
      [
        "uv",
        "run",
        "uvicorn",
        "src.api.app:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000"
      ]

    env_file:
      - .env

    expose:
      - "8000"

    restart: unless-stopped

  guardian-console:
    build: .

    container_name: guardian-console

    command:
      [
        "uv",
        "run",
        "python",
        "-m",
        "streamlit",
        "run",
        "src/ui/app.py",
        "--server.port=8501",
        "--server.address=0.0.0.0"
      ]

    env_file:
      - .env

    expose:
      - "8501"

    depends_on:
      - guardian-api

    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: guardian-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - guardian-api
      - guardian-console
    restart: unless-stopped