# Redirect HTTP (Port 80) to HTTPS (Port 443)
server {
    listen 80;
    server_name guardian.gotihub.com;
    return 301 https://$host$request_uri;
}

# Secure HTTPS Server
server {
    listen 443 ssl;
    server_name guardian.gotihub.com;

    
    ssl_certificate /etc/letsencrypt/live/guardian.gotihub.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/guardian.gotihub.com/privkey.pem;

    # Performance & Security tweaks
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    client_max_body_size 20M;

    # Streamlit Frontend Console
    location / {
        proxy_pass http://guardian-console:8501;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # FastAPI backend
    location /api/ {
        proxy_pass http://guardian-api:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API Documentation
    location /docs {
        proxy_pass http://guardian-api:8000/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /openapi.json {
        proxy_pass http://guardian-api:8000/openapi.json;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}